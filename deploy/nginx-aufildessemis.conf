# Reverse proxy nginx for aufildessemis.be
# Modélé sur /etc/nginx/sites-enabled/cozy-page. Bind: 127.0.0.1:3011 (APP_PORT)
# Note : le redirect www -> apex est géré au niveau Cloudflare (Redirect Rule),
# donc le backend ne sert que aufildessemis.be.

server {
    listen 80;
    listen [::]:80;
    server_name aufildessemis.be;
    return 301 https://aufildessemis.be$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aufildessemis.be;

    ssl_certificate     /etc/letsencrypt/live/aufildessemis.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aufildessemis.be/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 30M;

    # Behind Cloudflare: log the real client IP, not the CF edge IP.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # IMPORTANT: empty Connection header (not "upgrade") — Next.js 16
        # standalone closes connections that arrive with "Connection: upgrade"
        # and an empty Upgrade header (i.e. non-websocket).
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
